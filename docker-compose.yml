services:
  parcel-tracker:
    build: .
    image: parcel-tracker-bot:local
    container_name: parcel-tracker-bot
    restart: unless-stopped
    env_file: .env
    volumes:
      - ./data:/app/data
      - ./plugins:/app/plugins:ro
    read_only: true
    tmpfs:
      - /tmp:size=64m,mode=1777
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    mem_limit: 512m
    cpus: 1.0
    pids_limit: 100
    healthcheck:
      test: ["CMD", "python", "-c", "import sqlite3, os; sqlite3.connect(os.getenv('DATABASE_PATH','/app/data/bot.db')).execute('SELECT 1')"]
      interval: 5m
      timeout: 15s
      retries: 3
      start_period: 30s
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "5"
